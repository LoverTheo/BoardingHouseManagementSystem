<!-- frontend/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | BoardingMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #0f1623;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Background decorative blobs */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
        }
        .bg-blob-1 {
            width: 500px; height: 500px;
            background: rgba(67, 97, 238, 0.08);
            top: -150px; left: -150px;
        }
        .bg-blob-2 {
            width: 400px; height: 400px;
            background: rgba(67, 97, 238, 0.05);
            bottom: -100px; right: -100px;
        }
        .bg-blob-3 {
            width: 200px; height: 200px;
            background: rgba(124, 155, 255, 0.06);
            top: 40%; left: 60%;
        }

        /* Card */
        .login-card {
            background: #fff;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            padding: 40px 40px 36px;
            position: relative;
            z-index: 1;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.35);
        }

        /* Brand */
        .login-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }
        .brand-icon {
            width: 38px; height: 38px;
            background: #4361ee;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; color: #fff;
            flex-shrink: 0;
        }
        .brand-name {
            font-size: 17px; font-weight: 600; color: #1a1a2e; letter-spacing: -0.3px;
        }
        .brand-sub {
            font-size: 11px; color: #9ca3af; margin-top: 1px;
        }

        /* Heading */
        .login-heading {
            font-size: 22px; font-weight: 600;
            color: #1a1a2e; letter-spacing: -0.4px;
            margin-bottom: 4px;
        }
        .login-sub {
            font-size: 13px; color: #9ca3af;
            margin-bottom: 28px;
        }

        /* Divider */
        .login-divider {
            height: 1px; background: #f3f4f6; margin-bottom: 24px;
        }

        /* Form */
        .form-label {
            font-size: 13px; font-weight: 500;
            color: #374151; margin-bottom: 5px; display: block;
        }

        .input-wrap {
            position: relative; margin-bottom: 16px;
        }

        .input-icon {
            position: absolute; left: 13px; top: 50%;
            transform: translateY(-50%);
            color: #9ca3af; font-size: 13px; pointer-events: none;
        }

        .form-input {
            width: 100%;
            font-family: 'DM Sans', sans-serif;
            font-size: 13.5px;
            border: 1px solid #e5e7eb;
            border-radius: 9px;
            padding: 10px 13px 10px 36px;
            color: #1a1a2e;
            background: #fff;
            transition: border-color 0.15s, box-shadow 0.15s;
            outline: none;
        }
        .form-input:focus {
            border-color: #4361ee;
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }
        .form-input::placeholder { color: #c4c9d4; }

        /* Password toggle */
        .input-wrap .toggle-pw {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            color: #9ca3af; font-size: 13px; padding: 2px;
            transition: color 0.15s;
        }
        .input-wrap .toggle-pw:hover { color: #6b7280; }

        /* ID input monospace */
        #student_id { font-family: 'DM Mono', monospace; letter-spacing: 0.03em; }

        /* Submit button */
        .login-btn {
            width: 100%; padding: 11px;
            background: #4361ee; color: #fff;
            border: none; border-radius: 9px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px; font-weight: 500;
            cursor: pointer; margin-top: 4px;
            transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .login-btn:hover {
            background: #3451d1;
            box-shadow: 0 4px 14px rgba(67, 97, 238, 0.35);
        }
        .login-btn:active { transform: translateY(1px); }
        .login-btn:disabled {
            background: #9ca3af; cursor: not-allowed; box-shadow: none;
        }

        /* Spinner inside button */
        .btn-spinner {
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Error message */
        .login-error {
            display: none;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 10px 13px;
            font-size: 13px;
            color: #dc2626;
            margin-top: 12px;
            align-items: center;
            gap: 8px;
        }
        .login-error.show { display: flex; }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: #d1d5db;
        }

        /* Fade in animation */
        .login-card {
            animation: cardIn 0.45s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Background blobs -->
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>

    <div class="login-card">

        <!-- Brand -->
        <div class="login-brand">
            <div class="brand-icon"><i class="fas fa-building"></i></div>
            <div>
                <div class="brand-name">BoardingMS</div>
                <div class="brand-sub">Management Portal</div>
            </div>
        </div>

        <div class="login-divider"></div>

        <div class="login-heading">Welcome back</div>
        <div class="login-sub">Sign in to your student account</div>

        <!-- Form -->
        <form id="loginForm" autocomplete="off">
            <div>
                <label class="form-label" for="student_id">Student ID</label>
                <div class="input-wrap">
                    <i class="fas fa-id-card input-icon"></i>
                    <input type="text" id="student_id" name="student_id"
                        class="form-input" placeholder="2024-0001" required autocomplete="off">
                </div>
            </div>

            <div>
                <label class="form-label" for="password">Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" name="password"
                        class="form-input" placeholder="••••••••" required autocomplete="off">
                    <button type="button" class="toggle-pw" id="togglePw" tabindex="-1">
                        <i class="fas fa-eye" id="togglePwIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <span class="btn-spinner" id="btnSpinner"></span>
                <span id="btnText">Sign in</span>
            </button>

            <div class="login-error" id="loginError">
                <i class="fas fa-circle-exclamation"></i>
                <span id="loginErrorMsg">Invalid ID or password.</span>
            </div>
        </form>

        <div class="login-footer">
            BoardingMS &nbsp;·&nbsp; Student Boarding Management
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
