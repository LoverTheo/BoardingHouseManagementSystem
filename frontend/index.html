<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Boarding House Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4 custom-card p-4 shadow">
                <h3 class="text-center mb-4 dashboard-header">Student Portal</h3>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">Student ID</label>
                        <input type="text" id="student_id" name="student_id" class="form-control" placeholder="2024-0001" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
