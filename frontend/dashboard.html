<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="custom-card p-5 shadow">
            <h2 class="dashboard-header">Welcome, <span id="userName">Student</span>!</h2>
            <p class="text-muted">
                ID: <span id="studentId">---</span> | 
                Nickname: <span id="nickname">---</span>
            </p>
            <hr>
            
            <div class="row">
                <div class="col-md-6">
                    <h4>🏠 Room Information</h4>
                    <p class="fs-5">
                        Room <strong id="roomNum">0</strong> — <span id="floorNum">N/A</span>
                    </p>
                </div>
            </div>

            <h4 class="mt-4">💰 Current Balances</h4>
            <table class="table table-hover mt-3">
                <thead class="table-light">
                    <tr>
                        <th>Category</th>
                        <th>Due Date</th> <th>Amount</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="billTableBody"></tbody>
            </table>
            
            <div class="text-end">
                <button onclick="logout()" class="btn btn-outline-secondary mt-3">Logout</button>
            </div>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
